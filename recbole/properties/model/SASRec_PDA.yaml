# SASRec_PDA: SASRec + Popularity-bias Deconfounding and Adjusting
# Footnote 13: causal learning only on the most recently interacted item.
# Inherits all SASRec parameters, adds pda_weight.
n_layers: 2                     # (int) The number of transformer layers.
n_heads: 2                      # (int) The number of attention heads.
hidden_size: 64                 # (int) The hidden state size.
inner_size: 256                 # (int) The inner hidden size in feed-forward layer.
hidden_dropout_prob: 0.5        # (float) Dropout probability.
attn_dropout_prob: 0.5          # (float) Attention dropout probability.
hidden_act: 'gelu'              # (str) Activation function in feed-forward layer.
layer_norm_eps: 1e-12           # (float) Layer norm epsilon.
initializer_range: 0.02         # (float) Std for normal initialization.
loss_type: 'CE'                 # (str) Loss function type ['BPR', 'CE'].
pda_weight: 1.0                 # (float) Weight of the popularity BPR loss term.
